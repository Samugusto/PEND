<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>TechConnect - Cadastro</title>
    <link rel="icon" href="img/output-onlinepngtools.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <div>
            <a href="https://github.com/Samugusto" target="_blank">
            <img src="img/Novo Projeto.png" height="40px"
                title="sim, foi eu que fiz não foi IA"><!--imagem logotipo exemplo TechConnect--></a>
            <h3>conectando o mundo de forma unida</h3>
        </div>
    </header>
<a href="piada.html" target="_blank">
        <img src="img/usuario.png" width="60px"
            class="imagem" title="por que eu posso clicar aqui?"><!--imagem para visualização bonita para os olhos no cadastro-->
            </a>

        <h2 class="titulo">Cadastro</h2>

        <form class="formulario">
            Nome:<br>
            <input type="text" id="nome" placeholder="digite seu nome"><i class="bi bi-exclamation-circle"
                id="icone3"></i><i class="bi bi-check-circle" id="icone4"></i>
            <!--nome se o campo estiver vazio não envia nada-->
            <p id="nomeveri">­</p><!--verificador de nome-->

            Email:<br>
            <input type="text" id="emailV" placeholder="Alguemdasilva@gmail.com"><i class="bi bi-exclamation-circle"
                id="icone5"></i><i class="bi bi-check-circle" id="icone6"></i><!---Email verificação de @ e .-->
            <p id="emailveri">­</p><!--paragrafo de aviso para o Email-->

            <div>
                Senha:<br>
                <input type="password" id="password" placeholder="digite sua senha" oninput="checkStrength()"><i
                    class="bi bi-eye-fill icone" id="botaoSenha"></i>
            </div>
            <!-- Barra de progresso -->
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div><!--barra de progresso de senha-->
            </div>

            Confirme sua senha:<br>
            <input type="password" id="senha2" placeholder="digite sua senha"><i class="bi bi-exclamation-circle"
                id="icone7"></i><i class="bi bi-check-circle" id="icone8"></i>
            <p id="senhaconfirm">­</p><!--paragrafo de aviso para a confirmação de senha-->

            <div>
                Telefone:<br>
                <input type="tel" id="telefone" maxlength="15" placeholder="(00) 0000-0000"
                    onkeyup="handlePhone(event)"><i class="bi bi-telephone-plus-fill icone2" id="botaotele0"></i>
                <ul id="lista"></ul>
                <p id="televeri">­</p><!--paragrafo de aviso para telefone-->
            </div>

            <button type="button"
                id="cadastrar">Cadastrar</button><!--botão simples com hover onde verifica se cada input está correto-->

            <p id="mensagem">­</p><br><!--exibe se o login foi feito com sucesso ou não-->

        </form>

    <script src="script.js"></script>

</body>

</html>
