<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <h2>Cadastro de Usuário</h2>

    <form>
        <!--verifica de todos os campos estão cheios ou vazios (da forma simples)-->
        Nome:<br>
        <input type="text" id="nome" placeholder="digite seu nome"><br><br> <!--nome se o campo estiver vazio não envia nada-->
        <p id="nomeveri"></p><!--veri de verificado-->
         
        Email:<br>
        <input type="text" id="emailV" placeholder="ALguemdasilva@gmail.com"><br><br><!---Email verificação de @ e .-->
        <p id="emailveri"></p>

        Senha:<br>
        <input type="password" id="senha" placeholder="digite sua senha"><i class="bi bi-eye-fill icone" id="botaoSenha"></i><br><br><!--senha colocar mostrar e ocultar senha (já funcional) colocar verificação de senha para ver se é forte-->
        <p id="senhaveri"></p>
        
        Confirme sua senha:<br>
        <input type="password" id="senha2" placeholder="digite sua senha"><i class="bi bi-eye-fill icone" id="botaoSenha"></i><br><br><!--senha colocar mostrar e ocultar senha (já funcional) colocar verificação de senha para ver se é forte-->
        <p id="senhaconfirm"></p>

        Telefone:<br>
        <input type="text" id="telefone" placeholder="00-0000-0000"><br><br><!--colocar de forma arrumada o telefone "00-0000-0000" -->
        <p id="televeri"></p>

        <button type="button" id="cadastrar">Cadastrar</button><!--botão simples com hover onde verifica se cada input está correto-->

        <p id="mensagem"></p><!--exibe se o login foi feito com sucesso ou não-->

    </form>

    <script src="script.js"></script>

</body>

</html>
